<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treinamento — BAS Auto | Muvecom</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #e8eef4;
      color: #2c3e50;
      padding: clamp(16px, 3vw, 32px);
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(1.125rem, 2.5vw, 1.375rem);
      font-weight: 600;
      margin: 0 0 1rem;
      letter-spacing: -0.02em;
      color: #1a2b3c;
    }

    .player {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #1a2b3c;
      box-shadow: 0 4px 24px rgba(26, 43, 60, 0.12);
    }

    .player::before {
      content: "";
      display: block;
      padding-bottom: 56.25%;
    }

    .player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .note {
      margin-top: 0.875rem;
      font-size: 0.8125rem;
      color: #5a6b7a;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Gravação do treinamento — BAS Auto</h1>
    <div class="player">
      <iframe
        src="https://drive.google.com/file/d/1Hbo_xqpy8gebbNKYN4o9uLgDm_6dWR0J/preview"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen
        title="Vídeo de treinamento no Google Drive"
      ></iframe>
    </div>
    <p class="note">
      Se o vídeo não carregar, contate o suporte Muvecom.
    </p>
  </div>
</body>
</html>
